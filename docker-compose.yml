services:
  postgres:
    image: postgres:16-alpine
    container_name: ijazah-postgres
    environment:
      POSTGRES_DB: ijazah
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ijazah_pg:/var/lib/postgresql/data

volumes:
  ijazah_pg:
